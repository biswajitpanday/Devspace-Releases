name: Feature request
description: Suggest a new feature or improvement for DevSpace
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! The most useful feature requests describe a real problem,
        not a pre-baked solution. Tell us what you're trying to do, and we'll figure out the
        best way to support it.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe your use case. What are you trying to do that DevSpace doesn't currently support well?
      placeholder: |
        I work across 30+ projects and need to filter the dashboard by client name.
        Currently I have to scroll through the full list every time.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Suggested solution (optional)
      description: If you have an idea for how this could work, share it -- but feel free to leave blank if you'd rather we figure it out.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Other tools, workarounds, or different ways DevSpace could solve this.
    validations:
      required: false

  - type: dropdown
    id: importance
    attributes:
      label: How important is this to you?
      options:
        - Nice to have -- I have a workaround
        - Useful -- it would meaningfully improve my workflow
        - Critical -- the workaround is painful and I'd consider switching tools
    validations:
      required: true

  - type: checkboxes
    id: confirmation
    attributes:
      label: Pre-flight check
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
        - label: This is a feature request, not a bug report
          required: true
